<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:linear-gradient(120deg,#ffe4ec,#e6f7ff);
color:#333;
overflow-x:hidden;
position:relative;
transition:0.4s;
}

/* NIGHT MODE */
body.night{
background:linear-gradient(120deg,#1a1f3a,#2c1e3d);
color:#f5f5f5;
}

/* FLOATING BLOBS */
.blob{
position:fixed;
border-radius:50%;
filter:blur(60px);
opacity:0.4;
z-index:-1;
animation:float 20s infinite ease-in-out;
}

.blob1{width:300px;height:300px;background:#ffb6d9;top:10%;left:10%;}
.blob2{width:250px;height:250px;background:#a8e6ff;bottom:10%;right:10%;}
.blob3{width:200px;height:200px;background:#ffd6e0;top:50%;left:50%;}

@keyframes float{
0%,100%{transform:translateY(0px);}
50%{transform:translateY(-40px);}
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.3);
backdrop-filter:blur(10px);
z-index:100;
}

body.night nav{background:rgba(0,0,0,0.3);}

.nav-links{
display:flex;
gap:20px;
align-items:center;
}

.nav-links a{
text-decoration:none;
color:inherit;
opacity:0.7;
cursor:pointer;
}

.nav-links a:hover,.active{opacity:1;}

.toggle{
cursor:pointer;
padding:6px 12px;
border-radius:20px;
background:linear-gradient(90deg,#ffd6e0,#d6f0ff);
}

/* HERO */
.hero{
display:flex;
align-items:center;
justify-content:center;
gap:40px;
padding-top:120px;
flex-wrap:wrap;
text-align:center;
}

.profile{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.hero-text h1{
font-size:45px;
background:linear-gradient(90deg,#ff9ecb,#9ed8ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SECTIONS */
.section{
min-height:100vh;
display:none;
flex-direction:column;
align-items:center;
padding:40px;
}

.section.active{display:flex;}

/* GLASS PROJECTS */
.project{
padding:20px;
margin:15px 0;
border-radius:15px;
background:rgba(255,255,255,0.4);
backdrop-filter:blur(10px);
box-shadow:0 5px 20px rgba(0,0,0,0.05);
transform:translateY(30px);
opacity:0;
transition:0.6s;
}

body.night .project{
background:rgba(255,255,255,0.05);
}

.project.show{
transform:translateY(0);
opacity:1;
}

.project:hover{
transform:translateY(-5px) scale(1.02);
}

/* BUTTON */
.github{
display:inline-block;
margin-top:5px;
padding:5px 12px;
border-radius:20px;
background:linear-gradient(90deg,#ffb6d9,#a8e6ff);
text-decoration:none;
}

/* TOOLS */
.tools span{
display:inline-block;
padding:4px 10px;
margin:3px;
border-radius:20px;
font-size:12px;
background:linear-gradient(90deg,#ffd6e0,#d6f0ff);
}

/* FOOTER */
footer{
margin-top:40px;
opacity:0.5;
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<nav>
<div>PORTFOLIO</div>
<div class="nav-links">
<a onclick="showSection('home')" class="active">Home</a>
<a onclick="showSection('projects')">Projects</a>
<a onclick="showSection('contact')">Contact</a>
<span class="toggle" onclick="toggleTheme()">☀️ / 🌙</span>
</div>
</nav>

<!-- HOME -->
<div id="home" class="section active">
<div class="hero">
<img src="profile.jpg" class="profile">
<div class="hero-text">
<h1>Your Name</h1>
<p>Turning raw data into decision systems.</p>
</div>
</div>
</div>

<!-- PROJECTS -->
<div id="projects" class="section">

<h1>Projects</h1>

<div class="project">Project 1 – GitHub Repo<div class="tools"><span>SQL</span></div></div>
<div class="project">Project 2 – GitHub Repo<div class="tools"><span>Python</span></div></div>

</div>

<!-- CONTACT -->
<div id="contact" class="section">
<h1>Contact</h1>
<p>Email</p>
<p>GitHub</p>
</div>

<footer>Portfolio Live</footer>

<script>
function showSection(id){
document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".nav-links a").forEach(a=>a.classList.remove("active"));
event.target.classList.add("active");

reveal();
}

function toggleTheme(){
document.body.classList.toggle("night");
}

function reveal(){
document.querySelectorAll('.project').forEach(p=>{
setTimeout(()=>p.classList.add('show'),200);
});
}
</script>

</body>
</html>

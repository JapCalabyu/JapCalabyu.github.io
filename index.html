<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
* {
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body {
background: radial-gradient(circle at top, #0b0f1a, #03050a);
color:#eaeaea;
overflow:hidden;
}

/* Ambient Glow */
body::before {
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, rgba(0,255,255,0.08), transparent 40%),
radial-gradient(circle at 80% 60%, rgba(140,0,255,0.08), transparent 40%);
z-index:-1;
}

/* NAV */
nav {
position:fixed;
width:100%;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.02);
backdrop-filter: blur(14px);
border-bottom:1px solid rgba(255,255,255,0.05);
z-index:100;
}

.logo {
letter-spacing:3px;
font-size:14px;
color:#9befff;
}

.burger {
cursor:pointer;
}

.burger span {
display:block;
width:26px;
height:2px;
background:#9befff;
margin:6px 0;
transition:0.4s;
}

/* MENU */
.menu {
position:fixed;
top:0;
right:-260px;
height:100%;
width:260px;
background:rgba(10,12,20,0.95);
backdrop-filter: blur(20px);
transition:0.5s;
padding-top:80px;
}

.menu a {
display:block;
padding:18px 30px;
text-decoration:none;
color:#aaa;
transition:0.3s;
}

.menu a:hover, .active {
color:#9befff;
background:rgba(155,239,255,0.08);
}

/* SECTIONS */
.section {
height:100vh;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
padding:40px;
text-align:center;
animation: fade 0.7s ease;
}

.section.active {
display:flex;
}

@keyframes fade {
from {opacity:0; transform:translateY(30px);}
to {opacity:1; transform:translateY(0);}
}

/* HERO */
.hero h1 {
font-size:70px;
font-weight:300;
letter-spacing:4px;
background:linear-gradient(90deg,#9befff,#c59bff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p {
margin-top:20px;
max-width:500px;
color:#bbb;
line-height:1.6;
}

/* PROJECT PANELS */
.projects-container {
display:flex;
gap:35px;
flex-wrap:wrap;
justify-content:center;
}

.panel {
background:rgba(255,255,255,0.03);
padding:30px;
border-radius:20px;
width:270px;
border:1px solid rgba(255,255,255,0.08);
backdrop-filter: blur(18px);
transition:0.4s;
position:relative;
overflow:hidden;
}

/* Glow Border */
.panel::before {
content:"";
position:absolute;
inset:0;
border-radius:20px;
padding:1px;
background:linear-gradient(120deg, transparent, #9befff, transparent);
mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);
-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);
mask-composite: exclude;
-webkit-mask-composite: xor;
opacity:0;
transition:0.4s;
}

.panel:hover::before {
opacity:1;
}

.panel:hover {
transform:translateY(-8px) scale(1.02);
}

.panel h3 {
margin-bottom:15px;
color:#9befff;
font-weight:400;
}

.panel a {
display:block;
margin:8px 0;
text-decoration:none;
color:#aaa;
transition:0.3s;
}

.panel a:hover {
color:#c59bff;
}
</style>
</head>

<body>

<nav>
<div class="logo">PORTFOLIO</div>
<div class="burger" onclick="toggleMenu()">
<span></span><span></span><span></span>
</div>
</nav>

<div class="menu" id="menu">
<a onclick="showSection('home')" class="active">Home</a>
<a onclick="showSection('projects')">Projects</a>
</div>

<div id="home" class="section active">
<div class="hero">
<h1>Portfolio</h1>
<p>Focused on building data-driven solutions across analytics, engineering, and machine intelligence.</p>
</div>
</div>

<div id="projects" class="section">
<div class="projects-container">

<div class="panel">
<h3>Data Analytics</h3>
<a href="#">Project 1</a>
<a href="#">Project 2</a>
<a href="#">Project 3</a>
</div>

<div class="panel">
<h3>Data Engineering</h3>
<a href="#">Project 1</a>
<a href="#">Project 2</a>
<a href="#">Project 3</a>
</div>

<div class="panel">
<h3>Data Science</h3>
<a href="#">Project 1</a>
<a href="#">Project 2</a>
<a href="#">Project 3</a>
</div>

</div>
</div>

<script>
function toggleMenu(){
let menu = document.getElementById("menu");
menu.style.right = menu.style.right === "0px" ? "-260px" : "0px";
}

function showSection(id){
document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".menu a").forEach(a=>a.classList.remove("active"));
event.target.classList.add("active");

toggleMenu();
}
</script>

</body>
</html>

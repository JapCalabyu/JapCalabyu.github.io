<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Data Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet"><style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0b0b0b;
    color: #f5f5f5;
}

nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(0,0,0,0.8);
    border-bottom: 1px solid #222;
}

nav button {
    background: none;
    border: none;
    color: #aaa;
    margin-left: 20px;
    cursor: pointer;
    font-size: 14px;
}

nav button:hover {
    color: white;
}

section {
    min-height: 100vh;
    padding: 120px 40px;
    display: none;
}

.active { display:block; }

h1 {
    font-weight: 600;
    margin-bottom: 10px;
}

h2 {
    margin-top:40px;
    font-weight:400;
    color:#bbb;
}

.card {
    border: 1px solid #222;
    padding: 20px;
    margin-top: 10px;
    background:#111;
}

.skill-bar {
    margin:15px 0;
}

.bar {
    height:6px;
    background:#222;
}

.progress {
    height:100%;
    background:#fff;
    width:0;
}
</style></head>
<body><nav>
<div>Portfolio</div>
<div>
<button onclick="showPage('about')">About</button>
<button onclick="showPage('projects')">Projects</button>
<button onclick="showPage('skills')">Skills</button>
</div>
</nav><section id="about" class="active">
<h1>About Me</h1>
<p>I specialize in Data Analytics, Data Engineering, and Data Science.</p>
</section><section id="projects">
<h1>Projects</h1><h2>Data Analytics</h2>
<div class="card">
<p><b>BRS:</b></p>
<p><b>Output:</b></p>
<p><b>Impact:</b></p>
</div><h2>Data Engineering</h2>
<div class="card">
<p><b>BRS:</b></p>
<p><b>Output:</b></p>
<p><b>Impact:</b></p>
</div><h2>Data Science</h2>
<div class="card">
<p><b>BRS:</b></p>
<p><b>Output:</b></p>
<p><b>Impact:</b></p>
</div>
</section><section id="skills">
<h1>Skills</h1>
<div class="skill-bar">
<p>Data Analytics</p>
<div class="bar"><div class="progress" data-skill="90"></div></div>
</div>
<div class="skill-bar">
<p>Data Engineering</p>
<div class="bar"><div class="progress" data-skill="85"></div></div>
</div>
<div class="skill-bar">
<p>Data Science</p>
<div class="bar"><div class="progress" data-skill="80"></div></div>
</div>
</section><script>
function showPage(page) {
    document.querySelectorAll('section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(page).classList.add('active');
    animateSkills();
}

function animateSkills() {
    document.querySelectorAll('.progress').forEach(bar => {
        let value = bar.getAttribute('data-skill');
        bar.style.width = value + '%';
    });
}
</script></body>
</html>

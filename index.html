<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: #05070d;
    color: #e6e6e6;
    overflow-x: hidden;
}

/* Background Grid */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: -1;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(0,255,255,0.2);
    z-index: 100;
}

.logo {
    font-size: 18px;
    letter-spacing: 2px;
    color: #00ffff;
}

.burger {
    cursor: pointer;
}

.burger span {
    display: block;
    width: 25px;
    height: 2px;
    background: #00ffff;
    margin: 5px 0;
    transition: 0.4s;
}

/* MENU */
.menu {
    position: fixed;
    top: 0;
    right: -250px;
    height: 100%;
    width: 250px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    transition: 0.4s;
    padding-top: 80px;
}

.menu a {
    display: block;
    padding: 15px 25px;
    color: #ccc;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.menu a:hover, .active {
    color: #00ffff;
}

/* SECTIONS */
.section {
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 40px;
    animation: fade 0.6s ease;
}

.section.active {
    display: flex;
}

@keyframes fade {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

/* HOME */
.hero h1 {
    font-size: 60px;
    background: linear-gradient(90deg,#00ffff,#a020f0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero p {
    margin-top: 15px;
    max-width: 500px;
    color: #aaa;
}

/* CARDS */
.projects-container {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    width: 260px;
    border: 1px solid rgba(0,255,255,0.2);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 15px #00ffff;
}

.card h3 {
    margin-bottom: 10px;
    color: #00ffff;
}

.card a {
    display: block;
    margin: 5px 0;
    color: #ccc;
    text-decoration: none;
}

.card a:hover {
    color: #a020f0;
}
</style>
</head>

<body>

<nav>
    <div class="logo">PORTFOLIO</div>
    <div class="burger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
</nav>

<div class="menu" id="menu">
    <a onclick="showSection('home')" class="active">Home</a>
    <a onclick="showSection('projects')">Projects</a>
</div>

<!-- HOME -->
<div id="home" class="section active">
    <div class="hero">
        <h1>Portfolio</h1>
        <p>Professional data-focused portfolio showcasing analytics, engineering, and science projects.</p>
    </div>
</div>

<!-- PROJECTS -->
<div id="projects" class="section">
    <div class="projects-container">

        <div class="card">
            <h3>Data Analytics</h3>
            <a href="#">Project 1</a>
            <a href="#">Project 2</a>
            <a href="#">Project 3</a>
        </div>

        <div class="card">
            <h3>Data Engineering</h3>
            <a href="#">Project 1</a>
            <a href="#">Project 2</a>
            <a href="#">Project 3</a>
        </div>

        <div class="card">
            <h3>Data Science</h3>
            <a href="#">Project 1</a>
            <a href="#">Project 2</a>
            <a href="#">Project 3</a>
        </div>

    </div>
</div>

<script>
function toggleMenu(){
    let menu = document.getElementById("menu");
    menu.style.right = menu.style.right === "0px" ? "-250px" : "0px";
}

function showSection(id){
    document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll(".menu a").forEach(a=>a.classList.remove("active"));
    event.target.classList.add("active");

    toggleMenu();
}
</script>

</body>
</html>

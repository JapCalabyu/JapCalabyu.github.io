<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese Minimal Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet"><style>
body {
    margin: 0;
    font-family: 'Noto Sans JP', sans-serif;
    background: #fafafa;
    color: #1a1a1a;
}

nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: white;
    border-bottom: 1px solid #eee;
}

nav button {
    background: none;
    border: none;
    color: #666;
    margin-left: 20px;
    cursor: pointer;
    font-size: 14px;
    letter-spacing: 1px;
}

nav button:hover {
    color: #000;
}

section {
    min-height: 100vh;
    padding: 120px 40px;
    display: none;
    max-width: 900px;
    margin: auto;
}

.active { display:block; }

h1 {
    font-weight: 600;
    margin-bottom: 10px;
}

h2 {
    margin-top:40px;
    font-weight:400;
    color:#888;
}

.card {
    border-left: 2px solid #d32f2f;
    padding: 20px;
    margin-top: 20px;
    background:white;
}

.skill-bar {
    margin:15px 0;
}

.bar {
    height:4px;
    background:#eee;
}

.progress {
    height:100%;
    background:#d32f2f;
    width:0;
}

.jp {
    color:#d32f2f;
    font-size:12px;
    letter-spacing:2px;
}
</style></head>
<body><nav>
<div>私のポートフォリオ</div>
<div>
<button onclick="showPage('about')">概要</button>
<button onclick="showPage('projects')">プロジェクト</button>
<button onclick="showPage('skills')">スキル</button>
</div>
</nav><section id="about" class="active">
<div class="jp">ABOUT</div>
<h1>About Me</h1>
<p>I specialize in Data Analytics, Data Engineering, and Data Science.</p>
</section><section id="projects">
<div class="jp">PROJECTS</div>
<h1>Projects</h1><h2>Data Analytics</h2>
<div class="card">
<p><b>BRS:</b></p>
<p><b>Output:</b></p>
<p><b>Impact:</b></p>
</div><h2>Data Engineering</h2>
<div class="card">
<p><b>BRS:</b></p>
<p><b>Output:</b></p>
<p><b>Impact:</b></p>
</div><h2>Data Science</h2>
<div class="card">
<p><b>BRS:</b></p>
<p><b>Output:</b></p>
<p><b>Impact:</b></p>
</div>
</section><section id="skills">
<div class="jp">SKILLS</div>
<h1>Skills</h1>
<div class="skill-bar">
<p>Data Analytics</p>
<div class="bar"><div class="progress" data-skill="90"></div></div>
</div>
<div class="skill-bar">
<p>Data Engineering</p>
<div class="bar"><div class="progress" data-skill="85"></div></div>
</div>
<div class="skill-bar">
<p>Data Science</p>
<div class="bar"><div class="progress" data-skill="80"></div></div>
</div>
</section><script>
function showPage(page) {
    document.querySelectorAll('section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(page).classList.add('active');
    animateSkills();
}

function animateSkills() {
    document.querySelectorAll('.progress').forEach(bar => {
        let value = bar.getAttribute('data-skill');
        bar.style.width = value + '%';
    });
}
</script></body>
</html>

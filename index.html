<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:linear-gradient(120deg,#ffe4ec,#e6f7ff);
color:#333;
transition:0.4s;
}

body.night{
background:linear-gradient(120deg,#1a1f3a,#2c1e3d);
color:#f5f5f5;
}

/* NAV AUTO HIDE */
nav{
position:fixed;
top:0;
width:100%;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.3);
backdrop-filter:blur(10px);
transition:0.4s;
z-index:100;
}
nav.hidden{transform:translateY(-100%);}

.nav-links{display:flex;gap:15px;align-items:center;}

.nav-links a{
text-decoration:none;
opacity:0.7;
cursor:pointer;
}
.nav-links a:hover,.active{opacity:1;}

/* TOGGLE SWITCH */
.switch{
position:relative;
width:50px;height:25px;
background:#ddd;
border-radius:20px;
cursor:pointer;
}

.switch::after{
content:"";
position:absolute;
width:20px;height:20px;
top:2px;left:3px;
background:#fff;
border-radius:50%;
transition:0.3s;
}

body.night .switch{
background:#444;
}
body.night .switch::after{
transform:translateX(24px);
}

/* HERO */
.hero{
text-align:center;
padding-top:120px;
}

.profile{
width:160px;height:160px;
border-radius:50%;
object-fit:cover;
margin-bottom:20px;
}

/* ACTION BUTTONS */
.actions{
margin-top:20px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:8px 15px;
border-radius:20px;
text-decoration:none;
background:linear-gradient(90deg,#ffb6d9,#a8e6ff);
font-size:14px;
}

/* SECTIONS */
.section{display:none;padding:40px;}
.section.active{display:block;}

/* PROJECT GROUP */
.project-group{margin:40px auto;max-width:800px;}

.project{
padding:15px;
margin:15px 0;
border-radius:12px;
background:rgba(255,255,255,0.4);
backdrop-filter:blur(10px);
}

/* PROJECT BUTTON */
.project-btn{
margin-top:5px;
display:inline-block;
padding:5px 10px;
border-radius:15px;
background:linear-gradient(90deg,#ffd6e0,#d6f0ff);
text-decoration:none;
font-size:12px;
}
</style>
</head>

<body>

<nav id="navbar">
<div>PORTFOLIO</div>
<div class="nav-links">
<a onclick="showSection('home')" class="active">Home</a>
<a onclick="showSection('projects')">Projects</a>
<a onclick="showSection('contact')">Contact</a>
<div class="switch" onclick="toggleTheme()"></div>
</div>
</nav>

<!-- HOME -->
<div id="home" class="section active">

<div class="hero">
<img src="profile.jpg" class="profile">
<h1>Your Name</h1>
<p>Turning raw data into decision systems.</p>

<div class="actions">
<a href="resume.pdf" class="btn">Resume</a>
<a href="#" class="btn">GitHub</a>
<a href="#" class="btn">LinkedIn</a>
<a href="mailto:you@email.com" class="btn">Email Me</a>
</div>
</div>

</div>

<!-- PROJECTS -->
<div id="projects" class="section">

<h1>Projects</h1>

<div class="project-group">
<h2>Data Analyst</h2>

<div class="project">
Project 1
<a href="#" class="project-btn">GitHub Repo</a>
<a href="#" class="project-btn">Live Demo</a>
</div>

<div class="project">
Project 2
<a href="#" class="project-btn">GitHub Repo</a>
<a href="#" class="project-btn">Case Study</a>
</div>
</div>

</div>

<!-- CONTACT -->
<div id="contact" class="section">
<h1>Contact</h1>
<p>Email: you@email.com</p>
<p>GitHub</p>
</div>

<script>
function showSection(id){
document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function toggleTheme(){
document.body.classList.toggle("night");
}

let nav=document.getElementById("navbar");
let timer;

document.addEventListener("mousemove",function(e){
if(e.clientY<50){
nav.classList.remove("hidden");
clearTimeout(timer);
}else{
timer=setTimeout(()=>nav.classList.add("hidden"),2000);
}
});
</script>

</body>
</html>
